services:
  grafana:
    image: grafana/grafana:latest@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    ports:
     - '3000:3000'
    # attach to dbs network
    networks:
      - dbs

networks:
  dbs:
    name: dbs
    external: true
