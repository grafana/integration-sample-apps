services:
  grafana:
    image: grafana/grafana:latest@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    ports:
     - '3000:3000'
    # attach to dbs network
    networks:
      - dbs

networks:
  dbs:
    name: dbs
    external: true
