# jinja/templates/main-node-cloud-init-template.yaml
# Cloud-init configuration for setting up Alloy and a local mongodb replicaset

apt:
  sources:
    grafana:
      source: deb https://apt.grafana.com stable main
      keyid: 963FA27710458545
      keyserver: https://apt.grafana.com/gpg.key

packages:
- git
- gpg
- alloy

runcmd:
  # General setup
  - sudo apt update

  # Install mtools pre-requisites
  - sudo apt install python3 python3-pip -y

  # Install mlaunch to PATH the lazy way as this is a transient test system
  - sudo pip3 install mtools[mlaunch] --break-system-packages

  # MongoDB Community Edition specific prerequisites
  # Public key
  - sudo apt install gnupg curl -y
  
  - sudo curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor

  # Create list file
  - sudo echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list

  # Reload & install
  - sudo apt update
  - sudo apt install mongodb-org -y

  # Stop mongod service in case it auto-started
  - sudo systemctl stop mongod
  

  # Spawn a three node replicaset with a config server and mongos
  - sudo mlaunch --replicaset --dir /data/mongodb

  # Let the alloy user read the mongod logs created by mlaunch (adm is the conventional log-reader group)
  - sudo chgrp -R adm /data/mongodb
  - sudo chmod -R g+rX /data/mongodb
  - sudo usermod -a -G adm alloy || echo "Could not add alloy to adm group"
  # - sudo mlaunch --replicaset --auth --auth-roles dbAdminAnyDatabase readWriteAnyDatabase userAdminAnyDatabase clusterAdmin clusterMonitor

  # Seed a user collection so the collection / document dashboards have data
  - "sudo mongosh 'mongodb://localhost:27017,localhost:27018,localhost:27019/?replicaSet=replset' --eval \"db.getSiblingDB('loadgen').events.createIndex({key: 1})\""

  # Start the continuous CRUD load generator (unit + script defined in write_files)
  - sudo systemctl enable --now mongodb-loadgen.service

  # Configure Alloy
  - sudo systemctl enable alloy.service
  - sudo systemctl start alloy.service

write_files:
# Alloy configuration

# Note for mongodb config, there are three separate configs, namely:
# Configs for mongos (27017) config server (27024) and shard (27018)
# this is based on `mlaunch --replicaset --sharded 2`
# which creates two shards for each of the three nodes in the replicaset,
# plus a mongos and config server on 27017 and 27024 respectively
- owner: root:root
  path: /etc/alloy/config.alloy
  content: |
    prometheus.exporter.self "alloy_check" { }

    discovery.relabel "alloy_check" {
      targets = prometheus.exporter.self.alloy_check.targets

      rule {
        target_label = "instance"
        replacement  = constants.hostname
      }

      rule {
        target_label = "alloy_hostname"
        replacement  = constants.hostname
      }

      rule {
        target_label = "job"
        replacement  = "integrations/alloy-check"
      }
    }

    prometheus.scrape "alloy_check" {
      targets    = discovery.relabel.alloy_check.output
      forward_to = [prometheus.relabel.alloy_check.receiver]  

      scrape_interval = "60s"
    }

    prometheus.relabel "alloy_check" {
      forward_to = [prometheus.remote_write.metrics_service.receiver]

      rule {
        source_labels = ["__name__"]
        regex         = "(prometheus_target_sync_length_seconds_sum|prometheus_target_scrapes_.*|prometheus_target_interval.*|prometheus_sd_discovered_targets|alloy_build.*|prometheus_remote_write_wal_samples_appended_total|process_start_time_seconds)"
        action        = "keep"
      }
    }

    prometheus.remote_write "metrics_service" {
      endpoint {
        url = "{{ prom_url }}"

        {% if loki_user and loki_pass -%}
        basic_auth {
          username = "{{ prom_user }}"
          password = "{{ prom_pass }}"
        }
        {%- endif %}
      }
    }

    loki.write "grafana_cloud_loki" {
      endpoint {
        url = "{{ loki_url }}"

        {% if loki_user and loki_pass -%}
        basic_auth {
          username = "{{ loki_user }}"
          password = "{{ loki_pass }}"
        }
        {%- endif %}
      }
    }

    // Tail the mongod logs created by mlaunch under /data/mongodb and ship them to Loki.
    local.file_match "integrations_mongodb_logs" {
      path_targets = [{
        __address__     = "localhost",
        __path__        = "/data/mongodb/**/mongod.log",
        instance        = constants.hostname,
        job             = "integrations/mongodb",
        mongodb_cluster = "mongodb_sample_app_cluster",
      }]
    }

    loki.process "integrations_mongodb_logs" {
      forward_to = [loki.write.grafana_cloud_loki.receiver]

      // MongoDB 8.0 logs are structured JSON; promote severity and component to labels.
      stage.json {
        expressions = {
          level     = "s",
          component = "c",
        }
      }

      stage.labels {
        values = {
          level     = null,
          component = null,
        }
      }
    }

    loki.source.file "integrations_mongodb_logs" {
      targets    = local.file_match.integrations_mongodb_logs.targets
      forward_to = [loki.process.integrations_mongodb_logs.receiver]
    }

    prometheus.exporter.mongodb "integrations_mongodb_exporter_rs_primary" {
      mongodb_uri    = "mongodb://localhost:27017"
      direct_connect = true
    }
    discovery.relabel "integrations_mongodb_exporter_rs_primary" {
      targets = prometheus.exporter.mongodb.integrations_mongodb_exporter_rs_primary.targets

      rule {
        target_label = "service_name"
        replacement  = "Primary"
      }

      rule {
        target_label = "mongodb_cluster"
        replacement  = "mongodb_sample_app_cluster"
      }

      rule {
        target_label = "instance"
        replacement  = "mongodb_sample_app_rs_primary"
      }
    }

    prometheus.scrape "integrations_mongodb_exporter_rs_primary" {
      targets    = discovery.relabel.integrations_mongodb_exporter_rs_primary.output
      forward_to = [prometheus.remote_write.metrics_service.receiver]
      job_name   = "integrations/mongodb_exporter"
    }

    prometheus.exporter.mongodb "integrations_mongodb_exporter_rs_secondary" {
      mongodb_uri    = "mongodb://localhost:27018"
      direct_connect = true
    }

    discovery.relabel "integrations_mongodb_exporter_rs_secondary" {
      targets = prometheus.exporter.mongodb.integrations_mongodb_exporter_rs_secondary.targets

      rule {
        target_label = "service_name"
        replacement  = "Secondary"
      }

      rule {
        target_label = "mongodb_cluster"
        replacement  = "mongodb_sample_app_cluster"
      }

      rule {
        target_label = "instance"
        replacement  = "mongodb_sample_app_rs_secondary"
      }
    }

    prometheus.scrape "integrations_mongodb_exporter_rs_secondary" {
      targets    = discovery.relabel.integrations_mongodb_exporter_rs_secondary.output
      forward_to = [prometheus.remote_write.metrics_service.receiver]
      job_name   = "integrations/mongodb_exporter"
    }

# Load generator: continuous CRUD workload against the loadgen.events collection
# so insert/update/delete/query, oplog, latency and document panels have live
# data. Connects to the replica set so writes always reach the primary.
- owner: root:root
  path: /usr/local/bin/loadgen.js
  content: |
    const target = db.getSiblingDB('loadgen');

    // Idempotent safety net in case the seed step did not run.
    try { target.events.createIndex({ key: 1 }); } catch (e) { print('index: ' + e); }

    const STATUSES = ['new', 'active', 'done'];
    let counter = 0;

    while (true) {
      counter++;

      // Inserts (varied batch size) -> insert opcounters, oplog, document metrics.
      const batch = [];
      const n = 20 + Math.floor(Math.random() * 80);
      for (let i = 0; i < n; i++) {
        batch.push({
          key: Math.floor(Math.random() * 1000000),
          seq: counter,
          value: Math.random() * 1000,
          status: STATUSES[Math.floor(Math.random() * STATUSES.length)],
          payload: 'x'.repeat(256),
          createdAt: new Date(),
        });
      }
      try { target.events.insertMany(batch); } catch (e) { print('insert: ' + e); }

      // Reads (range + count) -> query/getmore opcounters and read latency.
      try {
        target.events.find({ key: { $lt: 500000 } }).limit(200).toArray();
        target.events.countDocuments({ status: 'active' });
      } catch (e) { print('read: ' + e); }

      // Updates -> update opcounters + oplog.
      try {
        target.events.updateMany({ status: 'new' }, { $set: { status: 'active', updatedAt: new Date() } });
      } catch (e) { print('update: ' + e); }

      // Deletes every few cycles -> delete opcounters + keep the collection bounded.
      if (counter % 5 === 0) {
        try {
          const oldIds = target.events.find().sort({ _id: 1 }).limit(500).toArray().map(d => d._id);
          if (oldIds.length) target.events.deleteMany({ _id: { $in: oldIds } });
        } catch (e) { print('delete: ' + e); }
      }

      sleep(2000);
    }

- owner: root:root
  path: /etc/systemd/system/mongodb-loadgen.service
  content: |
    [Unit]
    Description=MongoDB sample-app load generator
    After=network.target

    [Service]
    ExecStart=/usr/bin/mongosh --quiet "mongodb://localhost:27017,localhost:27018,localhost:27019/?replicaSet=replset" /usr/local/bin/loadgen.js
    Restart=always
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
